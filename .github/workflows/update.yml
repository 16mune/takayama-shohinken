name: Update Store Data

on:
  # 毎日 日本時間 17:00（UTC 08:00）に自動実行
  schedule:
    - cron: '0 8 * * *'

  # 手動実行もできるようにする
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: pip install requests

      - name: 加盟店データを更新
        run: python scripts/update_data.py

      - name: 変更があればコミット・プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/stores.json

          # 変更がある場合のみコミット
          if git diff --cached --quiet; then
            echo "変更なし。コミットをスキップします。"
          else
            git commit -m "chore: 加盟店データを自動更新 $(date +'%Y-%m-%d')"
            git push
          fi
